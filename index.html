<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Digital Twins Hub - Visualize and manage your digital twins"
    />

    <!-- Fonts (same as your template) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Poppins:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CDN (keeps your format without rewriting all classes) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- jsPDF (used in Projects export) -->
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

    <!-- Your custom CSS -->
    <link rel="stylesheet" href="./styles.css?v=20260410-5" />

    <title>Digital Twins Hub</title>
  </head>

  <body class="min-h-screen bg-gray-50">
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Navbar -->
    <header id="navbar"></header>

    <!-- Main content -->
    <main class="container mx-auto px-4 py-8">
      <div id="app"></div>
    </main>

    <!-- Chat assistant -->
    <div id="chat-assistant"></div>

    <!-- Gemini Chatbot (optional; requires user-provided API key) -->
    <div id="gemini-chatbot-container"></div>

    <!-- Toast notifications -->
    <div id="toasts" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[9999] space-y-2"></div>

    <!-- Gemini Chatbot Script (optional; no secrets in repo) -->
    <script type="module">
      import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

      const container = document.getElementById("gemini-chatbot-container");
      if (!container) {
        // no-op
      } else {
        const savedKey = localStorage.getItem("geminiApiKey") || "";

        container.innerHTML = `
          <style>
            #gemini-chat-toggle {
              position: fixed;
              bottom: 24px;
              right: 100px;
              width: 56px;
              height: 56px;
              border-radius: 50%;
              background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
              border: none;
              cursor: pointer;
              box-shadow: 0 10px 30px rgba(0,0,0,0.25);
              display: flex;
              align-items: center;
              justify-content: center;
              font-size: 24px;
              z-index: 10000;
              transition: transform 0.2s;
            }
            #gemini-chat-toggle:hover { transform: scale(1.05); }
            #gemini-chat-panel {
              position: fixed;
              bottom: 90px;
              right: 24px;
              width: 380px;
              max-width: calc(100vw - 48px);
              height: 550px;
              max-height: calc(100vh - 150px);
              background: white;
              border-radius: 16px;
              box-shadow: 0 20px 60px rgba(0,0,0,0.25);
              display: none;
              flex-direction: column;
              z-index: 10000;
              overflow: hidden;
              border: 1px solid rgba(0,0,0,0.08);
            }
            #gemini-chat-panel.open { display: flex; }
            .gemini-chat-header {
              padding: 14px 16px;
              background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
              color: white;
              font-weight: 700;
              font-size: 14px;
            }
            .gemini-chat-messages {
              flex: 1;
              padding: 16px;
              overflow-y: auto;
              display: flex;
              flex-direction: column;
              gap: 12px;
              background: #fafafa;
            }
            .gemini-message {
              max-width: 82%;
              padding: 10px 12px;
              border-radius: 12px;
              line-height: 1.4;
              font-size: 14px;
              white-space: pre-wrap;
              word-wrap: break-word;
            }
            .gemini-message.user {
              align-self: flex-end;
              background: #667eea;
              color: white;
            }
            .gemini-message.bot {
              align-self: flex-start;
              background: #e5e7eb;
              color: #111827;
            }
            .gemini-chat-input-area {
              display: flex;
              gap: 8px;
              padding: 14px;
              border-top: 1px solid #e5e7eb;
              background: white;
            }
            .gemini-chat-input {
              flex: 1;
              padding: 10px 12px;
              border: 1px solid #d1d5db;
              border-radius: 10px;
              font-size: 14px;
              outline: none;
            }
            .gemini-chat-send {
              padding: 10px 16px;
              border: none;
              background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
              color: white;
              border-radius: 10px;
              cursor: pointer;
              font-weight: 700;
              font-size: 14px;
            }
            .gemini-chat-send:disabled { opacity: 0.55; cursor: not-allowed; }
            .gemini-key-row {
              display: flex;
              gap: 8px;
              padding: 14px;
              border-top: 1px solid #e5e7eb;
              background: #fff;
            }
            .gemini-key-input {
              flex: 1;
              padding: 10px 12px;
              border: 1px solid #d1d5db;
              border-radius: 10px;
              font-size: 13px;
              outline: none;
            }
            .gemini-key-save {
              padding: 10px 12px;
              border: none;
              background: #111827;
              color: white;
              border-radius: 10px;
              cursor: pointer;
              font-weight: 700;
              font-size: 13px;
            }
            @media (max-width: 640px) {
              #gemini-chat-panel {
                width: calc(100vw - 32px);
                height: calc(100vh - 140px);
                right: 16px;
                bottom: 85px;
              }
              #gemini-chat-toggle { right: 84px; bottom: 16px; }
            }
          </style>

          <button id="gemini-chat-toggle" aria-label="Open Gemini chat">✨</button>
          <div id="gemini-chat-panel">
            <div class="gemini-chat-header">Gemini Assistant (Optional)</div>
            <div class="gemini-chat-messages" id="gemini-messages"></div>
            <div class="gemini-key-row" id="gemini-key-row">
              <input id="gemini-key" class="gemini-key-input" type="password" placeholder="Paste Gemini API key to enable" value="${savedKey.replace(/"/g, "&quot;")}" />
              <button id="gemini-key-save" class="gemini-key-save">Save</button>
            </div>
            <div class="gemini-chat-input-area">
              <input id="gemini-input" class="gemini-chat-input" type="text" placeholder="Ask Gemini..." />
              <button id="gemini-send" class="gemini-chat-send">Send</button>
            </div>
          </div>
        `;

        const toggleBtn = document.getElementById("gemini-chat-toggle");
        const panel = document.getElementById("gemini-chat-panel");
        const messagesEl = document.getElementById("gemini-messages");
        const inputEl = document.getElementById("gemini-input");
        const sendBtn = document.getElementById("gemini-send");
        const keyRow = document.getElementById("gemini-key-row");
        const keyEl = document.getElementById("gemini-key");
        const keySaveBtn = document.getElementById("gemini-key-save");

        let isOpen = false;
        let genAI = null;
        let history = [];

        const addMessage = (text, sender) => {
          const div = document.createElement("div");
          div.className = `gemini-message ${sender}`;
          div.textContent = String(text || "");
          messagesEl?.appendChild(div);
          if (messagesEl) messagesEl.scrollTop = messagesEl.scrollHeight;
        };

        const initWithKey = (apiKey) => {
          const k = String(apiKey || "").trim();
          if (!k) return false;
          try {
            genAI = new GoogleGenerativeAI(k);
            addMessage("Gemini enabled. Ask me anything about the site.", "bot");
            return true;
          } catch (_) {
            genAI = null;
            return false;
          }
        };

        // Auto-init if user already saved a key
        if (savedKey) {
          const ok = initWithKey(savedKey);
          if (ok && keyRow) keyRow.style.display = "none";
        } else {
          addMessage("To enable Gemini, paste your Gemini API key below (stored only in your browser).", "bot");
        }

        keySaveBtn?.addEventListener("click", () => {
          const k = String(keyEl?.value || "").trim();
          if (!k) return;
          localStorage.setItem("geminiApiKey", k);
          const ok = initWithKey(k);
          if (ok && keyRow) keyRow.style.display = "none";
        });

        const sendMessage = async () => {
          if (!genAI) {
            addMessage("Gemini is not enabled yet. Paste an API key above.", "bot");
            return;
          }

          const userText = String(inputEl?.value || "").trim();
          if (!userText) return;
          addMessage(userText, "user");
          history.push({ role: "user", parts: [{ text: userText }] });
          if (inputEl) inputEl.value = "";
          if (sendBtn) sendBtn.disabled = true;

          try {
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            const chat = model.startChat({ history: history.slice(0, -1) });
            const result = await chat.sendMessage(userText);
            const txt = result?.response?.text?.() || "";
            addMessage(txt, "bot");
            history.push({ role: "model", parts: [{ text: txt }] });
          } catch (e) {
            addMessage(`Error: ${String(e?.message || e)}`, "bot");
          } finally {
            if (sendBtn) sendBtn.disabled = false;
            inputEl?.focus?.();
          }
        };

        toggleBtn?.addEventListener("click", () => {
          isOpen = !isOpen;
          panel?.classList.toggle("open", isOpen);
          if (isOpen) inputEl?.focus?.();
        });

        sendBtn?.addEventListener("click", sendMessage);
        inputEl?.addEventListener("keydown", (e) => {
          if (e.key === "Enter" && !sendBtn?.disabled) sendMessage();
        });
      }
    </script>

    <!-- Data + App -->
    <script src="./projectsCatalog.js?v=20260409-3"></script>
    <script src="./mindmapLabsData.js?v=20260413-1"></script>
    <script src="./mindmapLabs.js?v=20260410-2"></script>
    <script src="./app.js?v=20260413-2"></script>
  </body>
</html>
