<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Digital Twins Hub - Visualize and manage your digital twins"
    />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Poppins:wght@000;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@0400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jsPDF -->
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <!-- Your custom CSS -->
    <link rel="stylesheet" href="./styles.css" />

    <!-- Inline Chatbot Styles -->
    <style>
      /* Chatbot Wrapper */
      #chatbot-wrapper {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 10000;
        font-family: Arial, sans-serif;
      }

      /* Launcher Button */
      #chatbot-launcher {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: #2563eb;
        color: white;
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s ease;
      }

      #chatbot-launcher:hover {
        transform: scale(1.1);
      }

      /* Chat Container */
      .chat-container {
        position: absolute;
        bottom: 80px;
        right: 0;
        width: 420px;
        height: 700px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        display: none;
        flex-direction: column;
        overflow: hidden;
      }

      .chat-container.active {
        display: flex;
      }

      .chat-header {
        padding: 16px;
        font-size: 20px;
        font-weight: bold;
        border-bottom: 1px solid #e5e5e5;
        background: #ffffff;
      }

      .chat-messages {
        flex: 1;
        padding: 16px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: #fafafa;
      }

      .chat-messages .message {
        max-width: 80%;
        padding: 12px 14px;
        border-radius: 14px;
        line-height: 1.4;
        white-space: pre-wrap;
        word-wrap: break-word;
        font-size: 14px;
      }

      .chat-messages .user {
        align-self: flex-end;
        background: #dbeafe;
      }

      .chat-messages .bot {
        align-self: flex-start;
        background: #e5e7eb;
      }

      .chat-input {
        display: flex;
        gap: 10px;
        padding: 14px;
        border-top: 1px solid #e5e5e5;
        background: white;
      }

      .chat-input input {
        flex: 1;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 10px;
        font-size: 15px;
        outline: none;
      }

      .chat-input button {
        padding: 12px 16px;
        border: none;
        background: #2563eb;
        color: white;
        border-radius: 10px;
        cursor: pointer;
        font-size: 15px;
      }

      .chat-input button:disabled {
        background: #93c5fd;
        cursor: not-allowed;
      }
    </style>

    <title>Digital Twins Hub</title>
  </head>
  <body class="min-h-screen bg-gray-50">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <!-- Navbar -->
    <header id="navbar"></header>
    <!-- Main content -->
    <main class="container mx-auto px-4 py-8">
      <div id="app"></div>
    </main>

    <!-- Chatbot Wrapper -->
    <div id="chatbot-wrapper">
      <div class="chat-container">
        <div class="chat-header">Gemini Chatbot</div>
        <div class="chat-messages" id="messages"></div>
        <div class="chat-input">
          <input id="userInput" type="text" placeholder="Type a message..." />
          <button id="sendBtn">Send</button>
        </div>
      </div>
      <button id="chatbot-launcher" aria-label="Open chat">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" width="28" height="28">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
      </button>
    </div>

    <!-- Toast notifications -->
    <div id="toasts" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[9999] space-y-2"></div>
    <!-- Data + App -->
    <script src="./projectsCatalog.js?v=20260327-15"></script>
    <script src="./app.js?v=20260327-15"></script>

    <!-- Inline Chatbot Script -->
    <script type="module">
      import { GoogleGenAI } from "https://esm.run/@google/genai";

      const ai = new GoogleGenAI({
        apiKey: "AIzaSyCgjArIfwTHWXgmLyrUQc8mU3LilQFsC90"
      });

      const chatContainer = document.querySelector(".chat-container");
      const launcher = document.getElementById("chatbot-launcher");
      const messagesEl = document.getElementById("messages");
      const inputEl = document.getElementById("userInput");
      const sendBtn = document.getElementById("sendBtn");

      const history = [];

      // Toggle chat visibility
      launcher.addEventListener("click", () => {
        chatContainer.classList.toggle("active");
        if (chatContainer.classList.contains("active")) {
          inputEl.focus();
        }
      });

      function addMessage(text, sender) {
        const div = document.createElement("div");
        div.className = `message ${sender}`;
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function sendMessage() {
        const userText = inputEl.value.trim();
        if (!userText) return;

        addMessage(userText, "user");
        history.push({
          role: "user",
          parts: [{ text: userText }]
        });

        inputEl.value = "";
        sendBtn.disabled = true;

        const typingEl = document.createElement("div");
        typingEl.className = "message bot";
        typingEl.textContent = "Thinking...";
        messagesEl.appendChild(typingEl);
        messagesEl.scrollTop = messagesEl.scrollHeight;

        try {
          const response = await ai.models.generateContent({
            model: "gemini-2.5-flash",
            contents: history
          });

          const botText = response.text || "No response.";
          typingEl.remove();
          addMessage(botText, "bot");

          history.push({
            role: "model",
            parts: [{ text: botText }]
          });
        } catch (error) {
          typingEl.remove();
          addMessage("Error: " + error.message, "bot");
        } finally {
          sendBtn.disabled = false;
          inputEl.focus();
        }
      }

      sendBtn.addEventListener("click", sendMessage);

      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      addMessage("Hi! Ask me anything.", "bot");
    </script>
  </body>
</html>
